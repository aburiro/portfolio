<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>login</title>
</head>
<body>
<div style="font-size: 40px"><h1><i><u>login</u></i></h1></div>

    <div style="display: flex;">

        <div style="  color: black;  font-size: 30px; gap: 40px; margin-left: 30px">
            <div style="display: flex; justify-content: center;  margin-left: 900px; margin-bottom: "><img src="assets/img/login_picture.jpg" height="319" width="379"/></div>
            <form><br>
                <div class="form-row" >
                    <div class="col-md-4 mb-3">
                        <label for="validationServer01"; style="font-size: 30px" ><i>First name</i></label>
                        <input type="text" style="font-size: 18px; margin-left: 30px ; height: 20px; width: 400px" class="form-control is-valid" id="validationServer01" placeholder="First name" value="Mark" required>
                        <div class="valid-feedback" style=" font-size: 18px; margin-left: 10px;color: darkgreen">
                            Looks good!
                        </div>
                        <br>
                    </div>

                    <div class="col-md-4 mb-3">
                        <label for="validationServer02"; style="font-size: 30px" ><i>Last name</i></label>
                        <input type="text" style="font-size: 18px; margin-left: 30px ; height: 20px; width: 400px" class="form-control is-valid" id="validationServer02" placeholder="Last name" value="Otto" required>
                        <div class="valid-feedback"style=" font-size: 18px; margin-left: 10px;color: darkgreen" >
                            Looks good!
                        </div>
                        <br>
                    </div>
                    <div class="col-md-4 mb-3" style=" display: flex">
                        <label for="validationServerUsername" style="font-size: 30px"><i>Username</i></label>
                        <div class="input-group">
                            <div class="input-group-prepend">
                                <span class="input-group-text" id="inputGroupPrepend3">@</span>
                            </div>
                            <input type="text" class="form-control is-invalid" style="font-size: 18px; margin-left: 30px ; height: 20px; width: 400px" id="validationServerUsername" placeholder="Username" aria-describedby="inputGroupPrepend3" required>
                            <div class="invalid-feedback"style=" font-size: 18px; margin-left: 10px;color: darkgreen" >
                                Please choose a username.
                            </div>
                        </div>
                    </div>
                    <br>
                </div>
                <div class="form-row">
                    <div class="col-md-6 mb-3">
                        <label for="validationServer03" style="font-size: 30px" ><i>City</i></label>
                        <input type="text" class="form-control is-invalid" style="font-size: 18px; margin-left: 30px ; height: 20px; width: 400px" id="validationServer03" placeholder="City" required>
                        <div class="invalid-feedback" style=" font-size: 18px; margin-left: 20px;color: darkgreen" >
                            Please provide a valid city.
                        </div>
                    </div>
                    <br>
                    <div class="col-md-3 mb-3">
                        <label for="validationServer04" style="font-size: 30px" ><i>State</i></label>
                        <input type="text" class="form-control is-invalid" style="font-size: 18px; margin-left: 30px ; height: 20px; width: 400px" id="validationServer04" placeholder="State" required>
                        <div class="invalid-feedback" style=" font-size: 18px; margin-left: 20px;color: darkgreen">
                            Please provide a valid state.
                        </div>
                    </div>
                    <br>
                    <div class="col-md-3 mb-3">
                        <label for="validationServer05" style="font-size: 30px"><i>Zip</i></label>
                        <input type="text" class="form-control is-invalid" style="font-size: 18px; margin-left: 30px ; height: 20px; width: 400px" id="validationServer05" placeholder="Zip" required>
                        <div class="invalid-feedback" style=" font-size: 18px; margin-left: 20px;color: darkgreen" >
                            Please provide a valid zip.
                        </div>
                    </div>
                    <br>
                </div>
                <div class="form-group">
                    <div class="form-check">
                        <input class="form-check-input is-invalid" type="checkbox" value="" id="invalidCheck3" required>
                        <label class="form-check-label" for="invalidCheck3">
                            Agree to terms and conditions
                        </label>
                        <div class="invalid-feedback">
                            You must agree before submitting.
                        </div>
                    </div>
                </div>
                <br>
                <button class="btn btn-primary"  type="submit" style="font-size: 18px; margin-left: 30px ; height: 20px; width: 200px" >Submit form</button>
            </form>
        </div>




        <div></div>

    </div>



</body>
</html>
